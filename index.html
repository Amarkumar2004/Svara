<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Svara — Premium Music Streaming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23a855f7'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='white'%3E♪%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div id="loader">
    <div class="loader-spinner"></div>
  </div>

  <div id="toast-container"></div>
  <div id="sidebar-overlay"></div>

  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="logo">
        <div class="logo-icon">🎵</div>
        <h1>Svara</h1>
      </div>

      <div class="nav-section">
        <h3>Menu</h3>
        <button class="nav-item active" data-section="trending-section">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </button>
        <button class="nav-item" data-section="search-section">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Search
        </button>
        <button class="nav-item" data-section="all-songs-section">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          Library
        </button>
      </div>

      <div class="nav-section">
        <h3>Discover</h3>
        <button class="nav-item" data-section="artists-section">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Artists
        </button>
        <button class="nav-item" data-section="albums-section">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
          Albums
        </button>
      </div>

      <div id="sidebar-playlist-section" class="nav-section" style="flex:1;min-height:0">
        <div class="playlist-header">
          <h3>Playlists</h3>
          <button id="create-playlist-btn" class="icon-btn" style="width:28px;height:28px;font-size:14px" title="New Playlist">+</button>
        </div>
        <div id="sidebar-playlist"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <div id="main-content">
      <!-- Topbar -->
      <header id="topbar">
        <button id="hamburger" aria-label="Toggle menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <div class="search-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search-input" type="text" placeholder="Search songs, artists, albums..." autocomplete="off" />
        </div>

        <div class="topbar-actions">
          <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" aria-label="Toggle theme">
            <span class="theme-toggle-icon">🌙</span>
          </button>
        </div>
      </header>

      <div class="main-area">
        <div id="search-section" style="scroll-margin-top:80px">
          <div id="search-results"></div>
        </div>

        <div id="main-sections">
          <!-- Trending Section -->
          <section id="trending-section" class="section"></section>

          <!-- Trending Grid -->
          <section id="trending-songs-section" class="section">
            <div class="section-header">
              <h2>Trending Now</h2>
              <button class="see-all" onclick="document.getElementById('all-songs-section').scrollIntoView({behavior:'smooth'})">See all</button>
            </div>
            <div id="trending-grid" class="song-grid"></div>
          </section>

          <!-- Recently Played -->
          <section id="recently-section" class="section">
            <div class="section-header">
              <h2>Recently Played</h2>
            </div>
            <div id="recently-grid" class="song-grid"></div>
          </section>

          <!-- Recommended -->
          <section id="recommended-section" class="section">
            <div class="section-header">
              <h2>Recommended For You</h2>
            </div>
            <div id="recommended-grid" class="song-grid"></div>
          </section>

          <!-- Artists -->
          <section id="artists-section" class="section">
            <div class="section-header">
              <h2>Top Artists</h2>
            </div>
            <div id="artist-grid" class="artist-grid"></div>
          </section>

          <!-- Albums -->
          <section id="albums-section" class="section">
            <div class="section-header">
              <h2>Popular Albums</h2>
            </div>
            <div id="album-grid" class="album-grid"></div>
          </section>

          <!-- All Songs -->
          <section id="all-songs-section" class="section">
            <div class="section-header">
              <h2>All Songs</h2>
            </div>
            <div id="all-songs-grid" class="song-grid"></div>
          </section>
        </div>
      </div>
    </div>

    <!-- Player Bar -->
    <footer id="player-bar">
      <div class="player-song-info">
        <img id="player-thumb" class="player-thumb" src="https://images.pexels.com/photos/3721941/pexels-photo-3721941.jpeg?auto=compress&cs=tinysrgb&w=200" alt="Song cover" />
        <div class="player-meta">
          <div id="player-song-title" class="player-song-title">Select a song</div>
          <div id="player-song-artist" class="player-song-artist">Start listening</div>
        </div>
        <button id="player-like-btn" class="player-like-btn" title="Like">♡</button>
      </div>

      <div class="player-controls">
        <div class="player-buttons">
          <button id="shuffle-btn" class="player-btn" title="Shuffle">🔀</button>
          <button id="prev-btn" class="player-btn" title="Previous">⏮</button>
          <button id="play-btn" class="player-btn play-main" title="Play/Pause">
            <span id="play-icon">▶</span>
          </button>
          <button id="next-btn" class="player-btn" title="Next">⏭</button>
          <button id="repeat-btn" class="player-btn" title="Repeat">🔁</button>
        </div>
        <div class="player-progress">
          <span id="current-time" class="player-time">0:00</span>
          <div id="progress-bar" class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width:0%"></div>
          </div>
          <span id="total-time" class="player-time">0:00</span>
        </div>
      </div>

      <div class="player-volume">
        <button id="volume-btn" class="volume-btn" title="Volume">🔊</button>
        <input id="volume-slider" class="volume-slider" type="range" min="0" max="1" step="0.01" value="0.7" />
      </div>
    </footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/player.js"></script>
  <script src="js/playlist.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
